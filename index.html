<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Racing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233,69,96,0.3);
        }
        #ui {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            align-items: center;
        }
        .gauge { text-align: center; }
        .gauge-label { font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .gauge-value { font-size: 28px; font-weight: bold; color: #e94560; }
        .gear-display {
            font-size: 48px; font-weight: bold; color: #0f3460;
            background: #e94560; width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        #controls { margin-top: 15px; font-size: 14px; color: #888; text-align: center; }
        #message {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px; font-weight: bold; color: #e94560;
            text-shadow: 0 0 20px rgba(233,69,96,0.8);
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        #message.visible { opacity: 1; }
        .rpm-bar {
            width: 200px; height: 20px; background: #16213e;
            border-radius: 10px; overflow: hidden; margin-top: 5px;
            border: 1px solid #0f3460;
        }
        .rpm-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #fdcb6e, #e94560);
            transition: width 0.05s; border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="900" height="400"></canvas>
    <div id="ui">
        <div class="gauge">
            <div class="gauge-label">RPM</div>
            <div class="gauge-value" id="rpmValue">0</div>
            <div class="rpm-bar"><div class="rpm-fill" id="rpmFill"></div></div>
        </div>
        <div class="gauge">
            <div class="gauge-label">GEAR</div>
            <div class="gear-display" id="gearValue">N</div>
        </div>
        <div class="gauge">
            <div class="gauge-label">SPEED (km/h)</div>
            <div class="gauge-value" id="speedValue">0</div>
        </div>
        <div class="gauge">
            <div class="gauge-label">TIME</div>
            <div class="gauge-value" id="timeValue">0.00</div>
        </div>
    </div>
    <div id="controls">
        <p><b>SPACE</b> - gas | <b>SHIFT</b> - gear up | <b>CTRL</b> - gear down | <b>ENTER</b> - start/restart</p>
    </div>
    <div id="message"></div>

    <script>
    (function() {
        'use strict';

        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');

        // === GAME STATE ===
        var STATE_WAITING = 0;
        var STATE_COUNTDOWN = 1;
        var STATE_RACING = 2;
        var STATE_FINISHED = 3;

        var gameState = STATE_WAITING;
        var raceTime = 0;
        var raceDistance = 402; // quarter mile in meters
        var playerDistance = 0;
        var countdownTimer = 0;
        var countdownStep = 3;
        var bestTime = null;

        // === PLAYER CAR ===
        var playerSpeed = 0; // m/s
        var playerRPM = 800;
        var playerGear = 0; // 0=neutral, 1-6
        var playerThrottle = 0;
        var playerShiftCooldown = 0;

        var PLAYER_MAX_RPM = 9000;
        var PLAYER_IDLE_RPM = 800;
        var PLAYER_REDLINE = 8500;
        var PLAYER_GEAR_RATIOS = [0, 3.5, 2.5, 1.8, 1.3, 1.0, 0.8];
        var PLAYER_GEAR_MAX_SPEED = [0, 40, 80, 130, 180, 230, 270]; // km/h
        var PLAYER_SHIFT_COOLDOWN = 15; // frames
        var PLAYER_ACCEL_MULT = 4.5;
        var PLAYER_REV_UP = 4500;
        var PLAYER_REV_DOWN = 3000;

        // === OPPONENT CAR ===
        var opponentSpeed = 0;
        var opponentDistance = 0;
        var opponentRPM = 800;
        var opponentGear = 0;
        var opponentShiftCooldown = 0;

        var OPP_MAX_RPM = 8800;
        var OPP_IDLE_RPM = 800;
        var OPP_GEAR_RATIOS = [0, 3.4, 2.4, 1.75, 1.25, 0.95, 0.75];
        var OPP_GEAR_MAX_SPEED = [0, 38, 75, 125, 175, 225, 260];

        // Randomized per race
        var oppReactionDelay = 10;
        var oppShiftDelay = 20;
        var oppOptimalRPM = 7800;
        var oppThrottle = 1;
        var oppAccelMult = 4.5;

        // === INPUT ===
        var keySpace = false;

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') { keySpace = true; e.preventDefault(); }
            if (e.code === 'Enter') { startRace(); e.preventDefault(); }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { shiftUp(); e.preventDefault(); }
            if (e.code === 'ControlLeft' || e.code === 'ControlRight') { shiftDown(); e.preventDefault(); }
        });
        document.addEventListener('keyup', function(e) {
            if (e.code === 'Space') { keySpace = false; }
        });

        // === VISUAL ===
        var roadOffset = 0;
        var trees = [];
        for (var i = 0; i < 10; i++) {
            trees.push({ x: i * 120, big: Math.random() > 0.5 });
        }

        // === FUNCTIONS ===

        function randomizeOpponent() {
            oppReactionDelay = 5 + Math.floor(Math.random() * 15);
            oppShiftDelay = 18 + Math.floor(Math.random() * 10);
            oppOptimalRPM = 7200 + Math.floor(Math.random() * 1200);
            oppThrottle = 0.85 + Math.random() * 0.15;
            oppAccelMult = 3.8 + Math.random() * 1.4; // 3.8-5.2
        }

        function startRace() {
            if (gameState !== STATE_WAITING && gameState !== STATE_FINISHED) return;
            gameState = STATE_COUNTDOWN;
            countdownStep = 3;
            countdownTimer = 0;
            raceTime = 0;
            playerDistance = 0;
            playerSpeed = 0;
            playerRPM = PLAYER_IDLE_RPM;
            playerGear = 0;
            playerThrottle = 0;
            playerShiftCooldown = 0;
            opponentSpeed = 0;
            opponentDistance = 0;
            opponentRPM = OPP_IDLE_RPM;
            opponentGear = 0;
            opponentShiftCooldown = 0;
            roadOffset = 0;
            randomizeOpponent();
            showMessage('GET READY!');
        }

        function shiftUp() {
            if (gameState !== STATE_RACING) return;
            if (playerShiftCooldown > 0) return;
            if (playerGear < 6) {
                playerGear++;
                playerShiftCooldown = PLAYER_SHIFT_COOLDOWN;
                if (playerGear > 1) {
                    playerRPM = Math.max(PLAYER_IDLE_RPM, playerRPM * 0.6);
                }
            }
        }

        function shiftDown() {
            if (gameState !== STATE_RACING) return;
            if (playerShiftCooldown > 0) return;
            if (playerGear > 0) {
                playerGear--;
                playerShiftCooldown = PLAYER_SHIFT_COOLDOWN;
                if (playerGear > 0) {
                    playerRPM = Math.min(PLAYER_MAX_RPM, playerRPM * 1.4);
                }
            }
        }

        function showMessage(text) {
            var msg = document.getElementById('message');
            msg.textContent = text;
            msg.classList.add('visible');
            setTimeout(function() { msg.classList.remove('visible'); }, 1500);
        }

        // === PHYSICS UPDATE ===

        function updatePlayer(dt) {
            if (playerShiftCooldown > 0) playerShiftCooldown--;

            playerThrottle = keySpace ? 1 : 0;

            if (playerGear === 0) {
                // Neutral - free rev
                if (playerThrottle > 0) {
                    playerRPM += PLAYER_REV_UP * dt;
                } else {
                    playerRPM -= PLAYER_REV_DOWN * dt;
                }
                playerRPM = Math.max(PLAYER_IDLE_RPM, Math.min(PLAYER_MAX_RPM, playerRPM));
            } else {
                var gearRatio = PLAYER_GEAR_RATIOS[playerGear];
                var maxSpeedMS = PLAYER_GEAR_MAX_SPEED[playerGear] / 3.6;

                if (playerThrottle > 0) {
                    var rpmNorm = playerRPM / PLAYER_MAX_RPM;
                    var torque = Math.sin(rpmNorm * Math.PI) * 1.2 + 0.3;
                    var accel = torque * gearRatio * PLAYER_ACCEL_MULT * playerThrottle;
                    playerSpeed += accel * dt;
                    if (playerSpeed > maxSpeedMS) playerSpeed = maxSpeedMS;
                } else {
                    playerSpeed -= 3 * dt;
                    if (playerSpeed < 0) playerSpeed = 0;
                }

                // RPM from speed
                var speedRatio = playerSpeed / maxSpeedMS;
                playerRPM = PLAYER_IDLE_RPM + (PLAYER_MAX_RPM - PLAYER_IDLE_RPM) * speedRatio;

                if (playerRPM >= PLAYER_MAX_RPM) {
                    playerRPM = PLAYER_MAX_RPM;
                }
            }

            playerDistance += playerSpeed * dt;
        }

        function updateOpponent(dt) {
            if (oppReactionDelay > 0) {
                oppReactionDelay--;
                return;
            }

            if (opponentShiftCooldown > 0) opponentShiftCooldown--;

            // Start in first gear
            if (opponentGear === 0 && opponentShiftCooldown <= 0) {
                opponentGear = 1;
                opponentShiftCooldown = oppShiftDelay;
            }

            if (opponentGear === 0) {
                opponentRPM = OPP_IDLE_RPM;
            } else {
                var gearRatio = OPP_GEAR_RATIOS[opponentGear];
                var maxSpeedMS = OPP_GEAR_MAX_SPEED[opponentGear] / 3.6;

                var rpmNorm = opponentRPM / OPP_MAX_RPM;
                var torque = Math.sin(rpmNorm * Math.PI) * 1.2 + 0.3;
                var accel = torque * gearRatio * oppAccelMult * oppThrottle;

                opponentSpeed += accel * dt;
                if (opponentSpeed > maxSpeedMS) opponentSpeed = maxSpeedMS;

                var speedRatio = opponentSpeed / maxSpeedMS;
                opponentRPM = OPP_IDLE_RPM + (OPP_MAX_RPM - OPP_IDLE_RPM) * speedRatio;

                // Shift up
                if (opponentRPM >= oppOptimalRPM && opponentGear < 6 && opponentShiftCooldown <= 0) {
                    opponentGear++;
                    opponentShiftCooldown = oppShiftDelay;
                    var newMaxSpeedMS = OPP_GEAR_MAX_SPEED[opponentGear] / 3.6;
                    var newRatio = opponentSpeed / newMaxSpeedMS;
                    opponentRPM = OPP_IDLE_RPM + (OPP_MAX_RPM - OPP_IDLE_RPM) * newRatio;
                }

                if (opponentRPM >= OPP_MAX_RPM) {
                    opponentRPM = OPP_MAX_RPM;
                }
            }

            opponentDistance += opponentSpeed * dt;
        }

        function update(dt) {
            if (gameState === STATE_COUNTDOWN) {
                countdownTimer += dt;
                if (countdownTimer >= 1) {
                    countdownTimer = 0;
                    countdownStep--;
                    if (countdownStep > 0) {
                        showMessage(countdownStep.toString());
                    } else {
                        showMessage('GO!');
                        gameState = STATE_RACING;
                    }
                }
                return;
            }

            if (gameState !== STATE_RACING) return;

            raceTime += dt;
            updatePlayer(dt);
            updateOpponent(dt);
            roadOffset += playerSpeed * dt * 5;

            // Check finish
            if (playerDistance >= raceDistance) {
                gameState = STATE_FINISHED;
                if (opponentDistance < raceDistance) {
                    showMessage('WIN! ' + raceTime.toFixed(2) + 's');
                } else {
                    showMessage('LOSE!');
                }
                if (!bestTime || raceTime < bestTime) bestTime = raceTime;
            }
            if (opponentDistance >= raceDistance && gameState === STATE_RACING) {
                gameState = STATE_FINISHED;
                showMessage('LOSE! ' + raceTime.toFixed(2) + 's');
            }
        }

        // === DRAWING ===

        function drawSky() {
            var g = ctx.createLinearGradient(0, 0, 0, 180);
            g.addColorStop(0, '#0f3460');
            g.addColorStop(1, '#16213e');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 900, 180);
        }

        function drawMountains() {
            ctx.fillStyle = '#1a1a3e';
            ctx.beginPath();
            ctx.moveTo(0, 180);
            for (var i = 0; i < 900; i += 60) {
                var h = 30 + Math.sin((i + roadOffset * 0.1) * 0.01) * 25;
                ctx.lineTo(i, 180 - h);
            }
            ctx.lineTo(900, 180);
            ctx.fill();
        }

        function drawTrees() {
            var treePos = roadOffset * 0.3;
            for (var i = 0; i < trees.length; i++) {
                var t = trees[i];
                var x = ((t.x - treePos) % 1200 + 1200) % 1200 - 100;
                var size = t.big ? 40 : 25;
                ctx.fillStyle = '#2d5a27';
                ctx.beginPath();
                ctx.moveTo(x, 185);
                ctx.lineTo(x - size/2, 185);
                ctx.lineTo(x, 185 - size);
                ctx.lineTo(x + size/2, 185);
                ctx.fill();
                ctx.fillStyle = '#5a3e1b';
                ctx.fillRect(x - 3, 185, 6, 15);
            }
        }

        function drawRoad() {
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 200, 900, 180);
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([40, 30]);
            ctx.lineDashOffset = -roadOffset;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 295);
            ctx.lineTo(900, 295);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#e94560';
            ctx.fillRect(0, 198, 900, 3);
            ctx.fillRect(0, 379, 900, 3);

            // Distance markers
            for (var m = 0; m <= 400; m += 100) {
                var relDist = m - playerDistance;
                var sx = 100 + relDist * 2;
                if (sx > 0 && sx < 900) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px Courier New';
                    ctx.fillText(m + 'm', sx, 195);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(sx, 200);
                    ctx.lineTo(sx, 380);
                    ctx.stroke();
                }
            }

            // Finish line
            var finishX = 100 + (raceDistance - playerDistance) * 2;
            if (finishX > 0 && finishX < 950) {
                for (var row = 0; row < 18; row++) {
                    for (var col = 0; col < 3; col++) {
                        ctx.fillStyle = (row + col) % 2 === 0 ? '#fff' : '#000';
                        ctx.fillRect(finishX + col * 10, 200 + row * 10, 10, 10);
                    }
                }
            }
        }

        function drawCar(x, y, color, isPlayer) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 80, y);
            ctx.lineTo(x + 85, y + 5);
            ctx.lineTo(x + 90, y + 15);
            ctx.lineTo(x + 85, y + 25);
            ctx.lineTo(x - 10, y + 25);
            ctx.lineTo(x - 15, y + 20);
            ctx.lineTo(x - 10, y);
            ctx.fill();

            // Roof
            var r = parseInt(color.slice(1,3),16), g2 = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
            ctx.fillStyle = 'rgb(' + Math.max(0,r-40) + ',' + Math.max(0,g2-40) + ',' + Math.max(0,b-40) + ')';
            ctx.beginPath();
            ctx.moveTo(x + 15, y); ctx.lineTo(x + 55, y);
            ctx.lineTo(x + 50, y - 15); ctx.lineTo(x + 20, y - 15);
            ctx.fill();

            // Window
            ctx.fillStyle = '#87ceeb';
            ctx.globalAlpha = 0.7;
            ctx.fillRect(x + 22, y - 13, 24, 11);
            ctx.globalAlpha = 1;

            // Wheels
            var bounce = Math.sin(roadOffset * 0.3 + (isPlayer ? 0 : 1));
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(x + 10, y + 27 + bounce, 10, 0, 6.28); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 65, y + 27 + bounce, 10, 0, 6.28); ctx.fill();
            ctx.fillStyle = '#ccc';
            ctx.beginPath(); ctx.arc(x + 10, y + 27 + bounce, 5, 0, 6.28); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 65, y + 27 + bounce, 5, 0, 6.28); ctx.fill();

            // Flame
            if (isPlayer && playerThrottle > 0 && playerGear > 0) {
                ctx.fillStyle = 'rgba(255,' + (100 + Math.random()*100|0) + ',0,' + (0.5+Math.random()*0.5).toFixed(2) + ')';
                var fl = 10 + Math.random() * 15 + (playerRPM / PLAYER_MAX_RPM) * 20;
                ctx.beginPath();
                ctx.moveTo(x - 15, y + 18);
                ctx.lineTo(x - 15 - fl, y + 15 + Math.random() * 6);
                ctx.lineTo(x - 15, y + 22);
                ctx.fill();
            }

            // Headlight
            ctx.fillStyle = 'rgba(255,255,200,0.8)';
            ctx.beginPath(); ctx.arc(x + 88, y + 10, 3, 0, 6.28); ctx.fill();
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Courier New';
            ctx.fillText(Math.round(playerSpeed * 3.6) + ' km/h', 20, 30);
            ctx.fillText('Dist: ' + Math.round(playerDistance) + 'm / ' + raceDistance + 'm', 20, 50);
            if (bestTime) {
                ctx.fillStyle = '#fdcb6e';
                ctx.fillText('Best: ' + bestTime.toFixed(2) + 's', 750, 30);
            }
            ctx.fillStyle = playerRPM > PLAYER_REDLINE ? '#e94560' : '#0f0';
            ctx.font = 'bold 20px Courier New';
            ctx.fillText('Gear: ' + (playerGear === 0 ? 'N' : playerGear), 750, 55);
        }

        function draw() {
            ctx.clearRect(0, 0, 900, 400);
            drawSky();
            drawMountains();
            drawTrees();
            drawRoad();

            // Opponent
            var oppX = 100 + (opponentDistance - playerDistance) * 2;
            drawCar(oppX, 320, '#3498db', false);

            // Player
            drawCar(100, 260, '#e94560', true);

            drawHUD();

            if (gameState === STATE_COUNTDOWN && countdownStep > 0) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 80px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(countdownStep, 450, 220);
                ctx.textAlign = 'left';
            }

            if (gameState === STATE_WAITING) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, 900, 400);
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 36px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('DRAG RACING', 450, 170);
                ctx.fillStyle = '#fff';
                ctx.font = '18px Courier New';
                ctx.fillText('Press ENTER to start', 450, 220);
                ctx.fillText('SPACE=gas  SHIFT=gear up  CTRL=gear down', 450, 250);
                ctx.textAlign = 'left';
            }
        }

        function updateUI() {
            document.getElementById('rpmValue').textContent = Math.round(playerRPM);
            document.getElementById('rpmFill').style.width = ((playerRPM / PLAYER_MAX_RPM) * 100) + '%';
            document.getElementById('gearValue').textContent = playerGear === 0 ? 'N' : playerGear;
            document.getElementById('speedValue').textContent = Math.round(playerSpeed * 3.6);
            document.getElementById('timeValue').textContent = raceTime.toFixed(2);

            var pct = playerRPM / PLAYER_MAX_RPM;
            var fill = document.getElementById('rpmFill');
            if (pct > 0.9) fill.style.background = '#e94560';
            else if (pct > 0.7) fill.style.background = 'linear-gradient(90deg, #00b894, #fdcb6e, #e94560)';
            else fill.style.background = 'linear-gradient(90deg, #00b894, #fdcb6e)';
        }

        // === GAME LOOP ===
        var lastTime = 0;
        function loop(timestamp) {
            var dt = (timestamp - lastTime) / 1000;
            if (dt > 0.05) dt = 0.05;
            lastTime = timestamp;

            update(dt);
            draw();
            updateUI();
            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
